<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Studies Quiz Sample Qn</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

        <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root {
            --navy: #0f1629;
            --navy2: #1a2344;
            --orange: #f97316;
            --orange2: #ea6c0a;
            --bg: #f0efe8;
            --card: #ffffff;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e5e5e0;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: var(--navy);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: var(--orange);
        }

        .header p {
            color: #9ca3af;
            margin-top: 0.4rem;
            font-size: 0.95rem;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.08);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.45rem 1.1rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .badge span {
            color: var(--orange);
        }

        /* SCREENS */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* TOPIC SELECT */
        .topic-screen {
            padding: 2rem 1.5rem 6rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 1.25rem;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .topic-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.4rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .topic-card:hover {
            border-color: #d1cfc8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.07);
        }

        .topic-card.selected {
            border-color: var(--orange);
            background: #fff8f3;
        }

        .topic-icon {
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .topic-card h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }

        .topic-card .qcount {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.3rem;
        }

        .topic-card.selected h3 {
            color: var(--orange2);
        }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.75rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-navy {
            background: var(--navy);
            color: #fff;
        }

        .btn-navy:hover {
            background: var(--navy2);
        }

        .btn-navy:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-orange {
            background: var(--orange);
            color: #fff;
        }

        .btn-orange:hover {
            background: var(--orange2);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-outline:hover {
            border-color: #aaa;
        }

        /* QUIZ SCREEN */
        .quiz-screen {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        .quiz-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .quiz-meta {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 600;
        }

        .quiz-topic-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .timer {
            background: var(--navy);
            color: #fff;
            padding: 0.35rem 0.9rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
        }

        .timer.warn {
            background: var(--red);
        }

        .progress-bar {
            background: var(--border);
            border-radius: 999px;
            height: 6px;
            margin-bottom: 2rem;
        }

        .progress-fill {
            background: var(--orange);
            border-radius: 999px;
            height: 100%;
            transition: width 0.4s;
        }

        .question-num {
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 1.75rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.18s;
            text-align: left;
        }

        .option:hover:not(.disabled) {
            border-color: var(--orange);
            background: #fff8f3;
        }

        .option.correct {
            border-color: var(--green);
            background: #f0fdf4;
            color: #15803d;
        }

        .option.wrong {
            border-color: var(--red);
            background: #fef2f2;
            color: #b91c1c;
        }

        .option.reveal-correct {
            border-color: var(--green);
            background: #f0fdf4;
            color: #15803d;
        }

        .option.disabled {
            cursor: not-allowed;
        }

        .explanation {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-top: 1.25rem;
            font-size: 0.88rem;
            color: #92400e;
            line-height: 1.5;
        }

        .quiz-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 1.75rem;
        }

        /* RESULTS SCREEN */
        .results-screen {
            max-width: 750px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        .result-hero {
            background: var(--navy);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            color: #fff;
            margin-bottom: 2rem;
        }

        .result-hero .score-big {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            color: var(--orange);
        }

        .result-hero p {
            color: #9ca3af;
            margin-top: 0.25rem;
        }

        .result-hero .grade {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0.75rem;
            color: #fff;
        }

        .topic-results {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .topic-result-row {
            background: var(--card);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic-result-row .trname {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .topic-result-row .trsc {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .trsc.good {
            color: var(--green);
        }

        .trsc.avg {
            color: var(--orange);
        }

        .trsc.poor {
            color: var(--red);
        }

        .topic-bar {
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin-top: 0.4rem;
            overflow: hidden;
        }

        .topic-bar-fill {
            height: 100%;
            border-radius: 4px;
        }

        /* SCOREBOARD */
        .scoreboard-screen {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        .sb-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .sb-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .sb-table {
            width: 100%;
            border-collapse: collapse;
        }

        .sb-table th {
            text-align: left;
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        .sb-table td {
            padding: 0.9rem 1rem;
            font-size: 0.88rem;
            border-bottom: 1px solid var(--border);
        }

        .sb-table tr:last-child td {
            border-bottom: none;
        }

        .sb-table tbody tr:hover {
            background: #f9f8f4;
        }

        .rank-badge {
            background: var(--navy);
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .rank-badge.gold {
            background: #f59e0b;
        }

        .rank-badge.silver {
            background: #9ca3af;
        }

        .rank-badge.bronze {
            background: #cd7c52;
        }

        .empty-sb {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        /* NAV */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 0.3rem;
            margin: 1.25rem auto 0;
            width: fit-content;
        }

        .nav-tab {
            padding: 0.4rem 1.1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            color: #9ca3af;
            border: none;
            background: transparent;
            font-family: inherit;
            transition: all 0.15s;
        }

        .nav-tab.active {
            background: #fff;
            color: var(--navy);
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .topic-grid {
                grid-template-columns: 1fr 1fr;
            }

            .quiz-screen,
            .results-screen {
                padding: 1.25rem 1rem 6rem;
            }
        }

        @media (max-width: 400px) {
            .topic-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .screen.active {
            animation: fadeIn 0.3s ease;
        }

        .option {
            animation: fadeIn 0.2s ease both;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="nav-tabs" id="mainNav">
            <button class="nav-tab active" onclick="showScreen('topic-screen')">📚 Topics</button>
            <button class="nav-tab" onclick="showScreen('scoreboard-screen')">🏆 Scoreboard</button>
        </div>
        <h1>Indian <span>Studies</span> Quiz</h1>
        <p>Comprehensive Topic-wise Assessment</p>
        <p style="color: red; font-size: 24px; font-weight: bold; text-align: center;">
    Disclaimer: This website is created by a student solely for question practice purposes.
</p>
        <div class="badges">
            <div class="badge"><span>19</span> Topics</div>
            <div class="badge"><span>520+</span> Questions</div>
            <div class="badge"><span>4</span> Modules</div>
        </div>
    </div>

    <!-- TOPIC SELECT SCREEN -->
    <div class="screen active" id="topic-screen">
        <div class="topic-screen">
            <div class="section-label">Select a topic to begin</div>
            <div class="topic-grid" id="topicGrid"></div>
        </div>
        <div class="bottom-bar">
            <button class="btn btn-navy" id="startBtn" onclick="startQuiz()" disabled>▶ Start Selected Topics</button>
            <button class="btn btn-orange" onclick="selectAll()">Select All Topics</button>
            <button class="btn btn-outline" onclick="clearAll()">Clear</button>
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="screen" id="quiz-screen">
        <div class="quiz-screen">
            <div class="quiz-topbar">
                <div>
                    <div class="quiz-topic-label" id="qTopicLabel"></div>
                    <div class="quiz-meta" id="qMeta"></div>
                </div>
                <div class="timer" id="timer">30</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-num" id="questionNum"></div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="explanation" id="explanation" style="display:none;"></div>
            <div class="quiz-nav">
                <button class="btn btn-outline" onclick="quitQuiz()">✕ Quit</button>
                <button class="btn btn-navy" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next →</button>
            </div>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div class="screen" id="results-screen">
        <div class="results-screen">
            <div class="result-hero">
                <div class="score-big" id="finalScore"></div>
                <p id="finalMeta"></p>
                <div class="grade" id="finalGrade"></div>
            </div>
            <div class="section-label">Topic Breakdown</div>
            <div class="topic-results" id="topicResultsList"></div>
            <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;">
                <button class="btn btn-navy" onclick="retryQuiz()">↩ Retry Same Topics</button>
                <button class="btn btn-orange" onclick="showScreen('topic-screen')">📚 Back to Topics</button>
            </div>
        </div>
    </div>

    <!-- SCOREBOARD SCREEN -->
    <div class="screen" id="scoreboard-screen">
        <div class="scoreboard-screen">
            <div class="sb-header">
                <h2>🏆 Scoreboard</h2>
                <button class="btn btn-outline" style="font-size:0.8rem;padding:0.5rem 1rem;"
                    onclick="clearScores()">Clear All</button>
            </div>
            <div class="section-label">Recent Quiz Attempts</div>
            <div id="scoreboardContent"></div>
        </div>
    </div>

    <script>
        // ========== QUESTION BANK ==========
        const TOPICS = [
            {
                id: 'traditional-knowledge',
                name: 'Traditional Knowledge',
                icon: '🌿',
                questions: [
                    { q: "Traditional knowledge refers to knowledge, innovations and practices of which communities?", o: ["Scientific communities", "Indigenous and local communities", "Government bodies", "Academic institutions"], a: 1 },
                    { q: "Traditional knowledge is transmitted from generation to generation primarily through which medium?", o: ["Written texts", "Internet", "Orally", "Radio broadcasts"], a: 2 },
                    { q: "Which organization defines traditional knowledge to include categories like agricultural, medicinal and biodiversity-related knowledge?", o: ["WHO", "UNESCO", "WIPO", "UN Security Council"], a: 2 },
                    { q: "Traditional knowledge 'tends to be collectively owned and takes the form of' which of the following?", o: ["Patents and copyrights", "Stories, songs, folklore and cultural values", "Scientific papers", "Judicial verdicts"], a: 1 },
                    { q: "Which of the following is NOT a challenge in using indigenous knowledge?", o: ["Lack of adequate management", "Lack of documentation", "Easy commercialization support", "Commercialisation and economic instability"], a: 2 },
                    { q: "How does indigenous knowledge differ from western knowledge in terms of transmission?", o: ["Indigenous uses written words; western uses oral", "Indigenous is oral/visual; western is written", "Both use identical methods", "Indigenous uses technology; western uses stories"], a: 1 },
                    { q: "Indigenous knowledge has which type of approach?", o: ["Reductionist", "Objective", "Holistic", "Analytical"], a: 2 },
                    { q: "Western knowledge has which type of approach compared to indigenous knowledge?", o: ["Holistic", "Subjective", "Reductionist", "Intuitive"], a: 2 },
                    { q: "The definition of indigenous knowledge by Johnson (1992) describes it as 'a body of knowledge built up by a group of people through generations of' what?", o: ["Reading books", "Living in close contact with nature", "Attending formal education", "Scientific experiments"], a: 1 },
                    { q: "Which of the following is a form traditional knowledge can take?", o: ["Industrial blueprints", "Agricultural practices and local language", "Stock market data", "Corporate reports"], a: 1 },
                    { q: "Indigenous knowledge is shared through which method?", o: ["Didactic approach", "Storytelling", "Scientific journals", "Examinations"], a: 1 },
                    { q: "What does WIPO stand for in the context of traditional knowledge?", o: ["World Intellectual Property Organization", "World Indigenous Protection Office", "World Information and Policy Organization", "World Investment and Patent Office"], a: 0 },
                    { q: "Which of the following correctly describes indigenous knowledge in relation to western knowledge?", o: ["Indigenous is objective; western is subjective", "Indigenous is subjective; western is objective", "Both are objective", "Both are subjective"], a: 1 },
                    { q: "Traditional knowledge is described as 'tradition-based literary, artistic or scientific works' — this is called a/an _____ way to refer to it.", o: ["Closed-ended", "Open-ended", "Restrictive", "Statutory"], a: 1 },
                    { q: "'Learning by doing and experiencing' is a characteristic of which type of knowledge?", o: ["Western knowledge", "Scientific knowledge", "Indigenous knowledge", "Academic knowledge"], a: 2 },
                    { q: "Which is a significance of indigenous knowledge?", o: ["It replaces modern science", "It provides solutions to people's issues connected to their environment", "It restricts global knowledge", "It is only useful in urban areas"], a: 1 },
                    { q: "Traditional knowledge is considered 'holistic' because it:", o: ["Can be compartmentalized easily", "Cannot be separated from the people who hold it", "Is limited to one discipline", "Focuses only on medicine"], a: 1 },
                    { q: "Indigenous people are described as the first settlers who have a different culture and belief system. What are they also called?", o: ["Migrants", "Local Tribal, Native, First, or Aboriginal populations", "Colonial settlers", "Modern scientists"], a: 1 },
                    { q: "What threatens the transmission of traditional knowledge to the young today?", o: ["Excess of funding", "Competition from other cultures and technology", "Too many elders", "Overproduction of indigenous goods"], a: 1 },
                    { q: "The concept of 'local knowledge' refers to knowledge possessed by a group that has done what?", o: ["Lived off the land for a long period in a particular area", "Studied in universities", "Worked in government offices", "Traveled internationally"], a: 0 },
                    { q: "Traditional knowledge is described as an 'authority system' that:", o: ["Sets rules governing use of resources with respect and obligation to share", "Allows unlimited exploitation", "Encourages commercialization", "Promotes individual ownership"], a: 0 },
                    { q: "Which of the following is NOT a fundamental principle of indigenous knowledge?", o: ["Dynamic", "Methodical", "Universal", "Individualistic"], a: 3 },
                    { q: "What is 'local knowledge' as distinct from indigenous knowledge?", o: ["Knowledge in major cities", "Any knowledge of people who lived in a particular area for long, regardless of being original inhabitants", "Knowledge from textbooks", "Scientific knowledge from labs"], a: 1 },
                    { q: "What is one importance of indigenous knowledge for development?", o: ["It replaces formal education", "It gives local empowerment and self-determination", "It blocks modernization", "It enforces rigid customs"], a: 1 },
                    { q: "'Traditional knowledge is a way of life — wisdom is using traditional knowledge in good ways. It is using the heart and the head together.' This means TK is:", o: ["Only intellectual", "Only emotional", "Both intellectual and spiritual/holistic", "Purely rational"], a: 2 },
                    { q: "Which of the following is a documented form of traditional knowledge?", o: ["Government policy papers", "Folklore, proverbs, rituals and community laws", "Corporate annual reports", "Digital databases only"], a: 1 },
                    { q: "What happens to traditional knowledge as elders die without passing it on?", o: ["It becomes officially documented", "The full richness of tradition is diminished and some is lost", "Other communities take it over", "It is patented"], a: 1 },
                    { q: "Traditional knowledge is said to be associated with:", o: ["Exploitation of native resources", "The sustainable use of native resources", "Destruction of biodiversity", "Patent filing"], a: 1 },
                    { q: "Why is protection of traditional knowledge crucial?", o: ["To restrict its spread", "For conservation of biodiversity and preserving the knowledge", "To increase commercial value", "To hand it over to corporations"], a: 1 },
                    { q: "Management of biodiversity and protection of traditional knowledge are closely linked because:", o: ["Biodiversity depends on corporate patents", "Local communities have autonomously protected wild spaces", "Governments control all biodiversity", "Modern technology alone can protect them"], a: 1 },
                ]
            },
            {
                id: 'science-technology',
                name: 'Science & Technology in Ancient India',
                icon: '🔬',
                questions: [
                    { q: "How far back does the recorded history of Indian scientific culture go?", o: ["1000 years", "2000 years", "More than 5000 years", "500 years"], a: 2 },
                    { q: "Indians developed one of the earliest written scripts known as:", o: ["Roman Script", "Indus Script", "Greek Script", "Arabic Script"], a: 1 },
                    { q: "When did Indians build urban towns with residential complexes and wastewater systems?", o: ["500 BC", "2500 BC", "1000 AD", "100 BC"], a: 1 },
                    { q: "The Delhi Iron Pillar has remained rust-free for more than how many years?", o: ["100 years", "500 years", "1000 years", "200 years"], a: 1 },
                    { q: "Indians discovered zero and were the first to use the decimal place value number system around which year?", o: ["100 AD", "1000 AD", "500 AD", "200 BC"], a: 2 },
                    { q: "Which Indian invention was the forerunner of all geared machines and paved the way for the Industrial Revolution?", o: ["Water wheel", "Cotton Gin", "Steam engine", "Printing press"], a: 1 },
                    { q: "The Harappan civilization reached its peak during which period?", o: ["500–200 BC", "2600–1900 BC", "1000–500 AD", "200–600 AD"], a: 1 },
                    { q: "Harappans were the first to adopt which of the following?", o: ["Democracy", "Systematic town planning", "Stock exchange", "Universities"], a: 1 },
                    { q: "Who were the first to grow cotton and establish a 'Cotton Empire' according to scholars?", o: ["Romans", "Chinese", "Harappans", "Greeks"], a: 2 },

                    { q: "The Representation of the People Act that deals with conduct of elections was passed in:", o: ["1950", "1951", "1952", "1949"], a: 1 },
                    { q: "Art 329 creates bars on interference of courts in election matters. It excludes from judicial review:", o: ["Only criminal election matters", "Law relating to delimitation; election disputes (only by election petition)", "All election disputes", "Only campaign-related disputes"], a: 1 },
                    { q: "'NOTA' refers to which option in Indian elections?", o: ["No Tax Applicable", "None Of The Above — allows voters to reject all candidates", "Nomination of All Applicants", "National Online Total Audit"], a: 1 },
                    { q: "The NOTA judgment was given in which case?", o: ["Kuldip Nayar case", "PUCL v. Union of India (2013)", "Lily Thomas v. Union of India", "SS Dhannoa case"], a: 1 },
                    { q: "Lily Thomas v. Union of India (2013) held that a member of Parliament or state legislature convicted and sentenced to imprisonment of 2 years or more faces:", o: ["A fine only", "Immediate disqualification", "Suspension for 6 months", "Referral to Ethics Committee"], a: 1 },
                    { q: "Union of India v. Association for Democratic Reforms (2002) established the right of electors to know the:", o: ["Party manifesto only", "Assets, liabilities and criminal records of candidates", "Only educational qualifications", "Only financial details"], a: 1 },
                    { q: "The removal of the Chief Election Commissioner can be done:", o: ["By the President alone on his discretion", "By Parliament in the same manner as a judge of the Supreme Court", "By the ruling party", "By the Prime Minister"], a: 1 },
                    { q: "The removal of Other Election Commissioners (not CEC) is done by:", o: ["Parliament", "President on recommendation of the CEC", "Supreme Court", "Chief Minister"], a: 1 },
                    { q: "'Shalaka' in the ancient Kshudraka-Malla Sangha voting system referred to:", o: ["Vote counting machines", "Voting tokens (pins)", "Ballot boxes", "Voting locations"], a: 1 },
                    { q: "'Shalaka Grahaka' was the person who:", o: ["Cast the votes", "Counted the votes", "Collected the voting tokens (Pin Collector)", "Announced the results"], a: 2 },
                    { q: "Art 243K establishes which body for conducting elections to Panchayats?", o: ["Election Commission of India", "State Election Commission", "District Election Commission", "Central Election Authority"], a: 1 },
                ]
            },
            {
                id: 'nhrc-ncw-panchayat',
                name: 'NHRC, NCW & Local Administration (Panchayat)',
                icon: '🌸',
                questions: [
                    { q: "The NHRC (National Human Rights Commission) was established under which Act?", o: ["Human Rights Act, 1990", "Protection of Human Rights Act, 1993", "National Human Rights Act, 2000", "Fundamental Rights Act, 1950"], a: 1 },
                    { q: "NHRC is described as the 'Apex Human Rights Institution in India.' It is classified as a:", o: ["Constitutional Body", "Statutory Body", "Non-statutory Body", "Judicial Body"], a: 1 },
                    { q: "India's NHRC is accredited with what status by the International Coordinating Committee (ICC)?", o: ["B Status", "A Status", "C Status", "Gold Status"], a: 1 },
                    { q: "The NHRC Chairperson must be a:", o: ["Retired High Court Chief Justice", "Retired Supreme Court Judge", "Active Supreme Court Judge", "Retired Cabinet Secretary"], a: 1 },
                    { q: "How many full-time members does the NHRC have?", o: ["Three", "Four", "Five", "Seven"], a: 2 },
                    { q: "The NHRC has how many 'deemed members' (ex-officio)?", o: ["Five", "Six", "Seven", "Eight"], a: 2 },
                    { q: "Which of the following is NOT a deemed member of NHRC?", o: ["Chairperson of NCW", "Chairperson of NCM", "Chief Election Commissioner", "Chairperson of NCPCR"], a: 2 },
                    { q: "The Gujarat Riots case saw the NHRC approach the Supreme Court on behalf of:", o: ["Majority community", "Minorities", "The government", "International agencies"], a: 1 },
                    { q: "In the Punjab Mass Cremation Case, the NHRC awarded compensation of Rs 1.75 lakh for mass cremation of how many unidentified bodies?", o: ["501", "751", "1051", "2001"], a: 2 },
                    { q: "The NCW (National Commission for Women) was established on:", o: ["15 August 1990", "31st January 1992", "26 January 1993", "26 November 1990"], a: 1 },
                    { q: "The NCW was established under which Act?", o: ["National Commission for Women Act, 1988", "National Commission for Women Act, 1990", "Women's Rights Act, 1993", "Gender Equality Act, 1992"], a: 1 },
                    { q: "Who was the first Chairperson of the NCW?", o: ["Renuka Chowdhury", "Rekha Sharma", "Mrs. Jayanti Patnaik", "Lalitha Kumaramangalam"], a: 2 },
                    { q: "The NCW was traced to the recommendations of the Committee on the Status of Women in India (CSWI) in which year?", o: ["1965", "1971", "1975", "1980"], a: 1 },
                    { q: "The NCW's composition includes a Chairperson and how many nominated members?", o: ["Three", "Five", "Seven", "Nine"], a: 1 },
                    { q: "Under NCW composition, at least how many members must be from Scheduled Castes and Scheduled Tribes?", o: ["One each (SC and ST)", "Two each", "One only", "None specifically required"], a: 0 },
                    { q: "Section 10 of the National Commission for Women Act deals with:", o: ["Composition", "Powers", "Functions of the Commission", "Financial provisions"], a: 2 },
                    { q: "Section 16 of the NCW Act deals with:", o: ["Powers of the NCW", "Central Government to consult NCW on all major policy matters affecting women", "Financial grants", "Composition of NCW"], a: 1 },
                    { q: "The NCW can take 'suo motu' notice of matters relating to:", o: ["Defence issues", "Deprivation of women's rights, non-implementation of laws for women", "Economic policy", "Foreign affairs"], a: 1 },
                    { q: "Panchayati Raj is the system of:", o: ["Urban self-government", "Rural self-government", "State governance", "Central administration"], a: 1 },
                    { q: "The 73rd Amendment to the Constitution gave constitutional status to:", o: ["Urban Local Bodies", "Panchayati Raj Institutions", "State Legislatures", "Election Commission"], a: 1 },
                    { q: "The three-tier Panchayati Raj system consists of Gram Panchayat, Panchayat Samiti and:", o: ["Tehsil", "Zila Parishad", "Block Council", "Municipal Corporation"], a: 1 },
                    { q: "The 73rd Amendment covers Articles:", o: ["Art 243 to 243O", "Art 243P to 243ZG", "Art 244 to 244B", "Art 240 to 243"], a: 0 },
                    { q: "The 11th Schedule lists the functions of:", o: ["Municipalities", "State Legislature", "Panchayats", "Supreme Court"], a: 2 },
                    { q: "Reservation for women in Panchayats is provided for at least:", o: ["25%", "33%", "50%", "40%"], a: 1 },
                    { q: "The Gram Sabha consists of:", o: ["Elected panchayat members only", "All voters registered in the panchayat area", "Only senior citizens", "Government officials"], a: 1 },
                    { q: "Which article provides for Village Panchayats under DPSP?", o: ["Art 38", "Art 39", "Art 40", "Art 44"], a: 2 },
                    { q: "NCSC stands for:", o: ["National Commission for Scheduled Communities", "National Commission for Scheduled Castes", "National Civil Services Commission", "National Commission for Social Care"], a: 1 },
                    { q: "The 'Chief Commissioner for Persons with Disabilities' is a deemed member of which body?", o: ["NHRC","NCW", "NCSC", "NCST"], a: 2 },
                    { q: "Which article of the Constitution provides for State Finance Commission for Panchayats?", o: ["Art 243H", "Art 243I", "Art 243J", "Art 243K"], a: 1 },
                    { q: "The Balwant Rai Mehta Committee (1957) recommended which system?", o: [ "Cooperative farming","Urban Local Bodies", "Three-tier Panchayati Raj system", "Two-party political system","Urban Local Bodies"], a: 4 },
                ]
            }
        ];

        // ========== STATE ==========
        let selectedTopics = new Set();
        let quizQueue = [];
        let currentQIndex = 0;
        let currentQ = null;
        let answered = false;
        let score = 0;
        let timerInterval = null;
        let timeLeft = 30;
        let topicScores = {};
        let allQuestions = [];
        let lastSelectedTopics = [];
        let scores = JSON.parse(localStorage.getItem('quizScores') || '[]');

        // ========== INIT ==========
        function init() {
            renderTopics();
            renderScoreboard();
        }

        function renderTopics() {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = TOPICS.map(t => `
    <div class="topic-card" id="tc-${t.id}" onclick="toggleTopic('${t.id}')">
      <span class="topic-icon">${t.icon}</span>
      <h3>${t.name}</h3>
      <div class="qcount">${t.questions.length} questions</div>
    </div>
  `).join('');
        }

        function toggleTopic(id) {
            if (selectedTopics.has(id)) selectedTopics.delete(id);
            else selectedTopics.add(id);
            document.getElementById('tc-' + id).classList.toggle('selected', selectedTopics.has(id));
            document.getElementById('startBtn').disabled = selectedTopics.size === 0;
        }

        function selectAll() {
            TOPICS.forEach(t => { selectedTopics.add(t.id); document.getElementById('tc-' + t.id).classList.add('selected'); });
            document.getElementById('startBtn').disabled = false;
        }

        function clearAll() {
            TOPICS.forEach(t => { selectedTopics.delete(t.id); document.getElementById('tc-' + t.id).classList.remove('selected'); });
            document.getElementById('startBtn').disabled = true;
        }

        // ========== QUIZ ==========
        function startQuiz() {
            lastSelectedTopics = [...selectedTopics];
            allQuestions = [];
            topicScores = {};
            TOPICS.filter(t => selectedTopics.has(t.id)).forEach(t => {
                topicScores[t.id] = { name: t.name, icon: t.icon, correct: 0, total: 0 };
                const qs = shuffle([...t.questions]).map(q => ({ ...q, topicId: t.id }));
                allQuestions.push(...qs);
            });
            quizQueue = shuffle(allQuestions);
            currentQIndex = 0;
            score = 0;
            showScreen('quiz-screen');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQIndex >= quizQueue.length) { endQuiz(); return; }
            currentQ = quizQueue[currentQIndex];
            answered = false;
            const topic = TOPICS.find(t => t.id === currentQ.topicId);
            document.getElementById('qTopicLabel').textContent = topic ? topic.icon + ' ' + topic.name : '';
            document.getElementById('qMeta').textContent = `Question ${currentQIndex + 1} of ${quizQueue.length}`;
            document.getElementById('questionNum').textContent = `Q${currentQIndex + 1}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('progressFill').style.width = ((currentQIndex / quizQueue.length) * 100) + '%';
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';

            const opts = document.getElementById('optionsContainer');
            opts.innerHTML = currentQ.o.map((opt, i) => `
    <button class="option" onclick="selectOption(${i})" id="opt-${i}">${String.fromCharCode(65 + i)}. ${opt}</button>
  `).join('');

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            updateTimer();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if (timeLeft <= 0) { clearInterval(timerInterval); autoSelect(); }
            }, 1000);
        }

        function updateTimer() {
            const el = document.getElementById('timer');
            el.textContent = timeLeft;
            el.classList.toggle('warn', timeLeft <= 10);
        }

        function autoSelect() {
            if (!answered) { selectOption(-1); }
        }

        function selectOption(i) {
            if (answered) return;
            clearInterval(timerInterval);
            answered = true;
            const correct = currentQ.a;
            const isCorrect = i === correct;

            if (isCorrect) {
                score++;
                topicScores[currentQ.topicId].correct++;
            }
            topicScores[currentQ.topicId].total++;

            for (let j = 0; j < currentQ.o.length; j++) {
                const btn = document.getElementById('opt-' + j);
                btn.classList.add('disabled');
                if (j === correct) btn.classList.add(isCorrect ? 'correct' : 'reveal-correct');
                else if (j === i) btn.classList.add('wrong');
            }

            if (currentQ.exp) {
                document.getElementById('explanation').textContent = '💡 ' + currentQ.exp;
                document.getElementById('explanation').style.display = 'block';
            }

            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentQIndex++;
            loadQuestion();
        }

        function quitQuiz() {
            clearInterval(timerInterval);
            showScreen('topic-screen');
        }

        function endQuiz() {
            clearInterval(timerInterval);
            const total = quizQueue.length;
            const pct = Math.round((score / total) * 100);

            document.getElementById('finalScore').textContent = score + '/' + total;
            document.getElementById('finalMeta').textContent = pct + '% correct · ' + total + ' questions attempted';

            let grade = '';
            if (pct >= 90) grade = '🏆 Excellent! Outstanding performance!';
            else if (pct >= 75) grade = '🌟 Great job! Well prepared!';
            else if (pct >= 60) grade = '👍 Good! Keep revising!';
            else if (pct >= 40) grade = '📚 Fair. More revision needed.';
            else grade = '💪 Keep studying! You can do it!';
            document.getElementById('finalGrade').textContent = grade;

            // Topic breakdown
            const list = document.getElementById('topicResultsList');
            list.innerHTML = Object.values(topicScores).map(ts => {
                if (ts.total === 0) return '';
                const p = Math.round((ts.correct / ts.total) * 100);
                const cls = p >= 70 ? 'good' : p >= 40 ? 'avg' : 'poor';
                const color = p >= 70 ? '#22c55e' : p >= 40 ? '#f97316' : '#ef4444';
                return `<div class="topic-result-row">
      <div>
        <div class="trname">${ts.icon} ${ts.name}</div>
        <div class="topic-bar"><div class="topic-bar-fill" style="width:${p}%;background:${color}"></div></div>
      </div>
      <div class="trsc ${cls}">${ts.correct}/${ts.total}</div>
    </div>`;
            }).join('');

            // Save score
            const record = {
                date: new Date().toLocaleDateString('en-IN'),
                time: new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }),
                score, total, pct,
                topics: Object.values(topicScores).filter(t => t.total > 0).map(t => t.name).join(', ')
            };
            scores.unshift(record);
            if (scores.length > 20) scores = scores.slice(0, 20);
            localStorage.setItem('quizScores', JSON.stringify(scores));

            showScreen('results-screen');
            renderScoreboard();
        }

        function retryQuiz() {
            selectedTopics = new Set(lastSelectedTopics);
            startQuiz();
        }

        // ========== SCOREBOARD ==========
        function renderScoreboard() {
            const el = document.getElementById('scoreboardContent');
            if (!scores || scores.length === 0) {
                el.innerHTML = '<div class="empty-sb">🎯 No quiz attempts yet. Start a quiz to see your scores here!</div>';
                return;
            }
            el.innerHTML = `<table class="sb-table">
    <thead><tr><th>#</th><th>Date & Time</th><th>Score</th><th>%</th><th>Topics</th></tr></thead>
    <tbody>${scores.map((s, i) => {
                const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                return `<tr>
        <td><div class="rank-badge ${cls}">${i + 1}</div></td>
        <td>${s.date} ${s.time}</td>
        <td><strong>${s.score}/${s.total}</strong></td>
        <td style="color:${s.pct >= 70 ? '#22c55e' : s.pct >= 40 ? '#f97316' : '#ef4444'};font-weight:700">${s.pct}%</td>
        <td style="font-size:0.78rem;color:#6b7280;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.topics}">${s.topics}</td>
      </tr>`;
            }).join('')}</tbody>
  </table>`;
        }

        function clearScores() {
            if (confirm('Clear all scores?')) {
                scores = [];
                localStorage.setItem('quizScores', '[]');
                renderScoreboard();
            }
        }

        // ========== UTILS ==========
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            if (id === 'scoreboard-screen') document.querySelectorAll('.nav-tab')[1].classList.add('active');
            else document.querySelectorAll('.nav-tab')[0].classList.add('active');
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * i + 1);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        init();
    </script>
</body>

</html>

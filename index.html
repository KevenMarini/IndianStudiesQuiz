<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Closed</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at top, #1a2344, #0f1629);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Floating background circles */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(249, 115, 22, 0.15);
            filter: blur(60px);
            animation: float 6s ease-in-out infinite;
        }

        .c1 {
            width: 250px;
            height: 250px;
            top: 10%;
            left: 15%;
        }

        .c2 {
            width: 200px;
            height: 200px;
            bottom: 15%;
            right: 15%;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            z-index: 2;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: #f97316;
        }

        p {
            font-size: 1.15rem;
            color: #cbd5e1;
            margin-bottom: 1.4rem;
            line-height: 1.6;
        }

        .highlight {
            color: #f97316;
            font-weight: 600;
        }

        .emoji {
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-block;
            margin-top: 1.2rem;
            padding: 0.75rem 1.6rem;
            border-radius: 999px;
            background: #f97316;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .btn:hover {
            background: #ea6c0a;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.4);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .linkedin {
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .linkedin a {
            color: #60a5fa;
            text-decoration: none;
        }

        .linkedin a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>

    <div class="container">
        <div class="emoji">🎓✨</div>

        <h1>Quiz <span>Completed</span></h1>

        <p>
            Hope your quiz went well.
        </p>

        <p>
            We’re now taking the website down.<br>
            Hope you enjoyed it and learned something new!
        </p>

        <p class="highlight">
            See you next time 👋
        </p>

        <a href="https://www.linkedin.com/in/keven-marini-9b3a58376/" target="_blank" class="btn">
            Connect on LinkedIn
        </a>

        <div class="footer">
            – Team No Name Yet :)
        </div>

        <div class="linkedin">
            <a href="https://www.linkedin.com/in/keven-marini-9b3a58376/" target="_blank">
                linkedin.com/in/keven-marini
            </a>
        </div>
    </div>

</body>
